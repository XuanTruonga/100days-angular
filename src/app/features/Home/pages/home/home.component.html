<div class="home">
  <h2>Home</h2>
  <form
    nzLayout="vertical"
    nz-form
    [formGroup]="validateForm"
    class="login-form"
    (ngSubmit)="submitForm()"
  >
    <div nz-row>
      <app-z-input
        label="Username"
        placeholder="Enter your username"
        [autoFocus]="true"
        [required]="true"
        [control]="validateForm.controls.username"
        [layout]="{ md: 10, sm: 9, xs: 24 }"
      />

      <app-z-input
        label="Username 1"
        placeholder="Enter your username"
        [required]="true"
        [control]="validateForm.controls.username1"
        [layout]="{ md: 10, sm: 9, xs: 24 }"
      />

      <app-z-input
        label="Username 2"
        placeholder="Enter your username"
        [required]="true"
        [control]="validateForm.controls.username2"
        [layout]="{ md: 4, sm: 6, xs: 24 }"
      />

      <app-z-input
        label="Username 3"
        placeholder="Enter your username"
        [required]="true"
        [control]="validateForm.controls.username3"
        layoutKey="LAYOUT_FORM_COLUMN_5"
      />

      <!-- <app-z-input
        label="Username 4"
        placeholder="Enter your username"
        [required]="true"
        [control]="validateForm.controls.username4"
        layoutKey="LAYOUT_FORM_COLUMN_5"
      />

      <app-z-input
        label="Password"
        placeholder="Enter your password"
        [required]="true"
        [control]="validateForm.controls.password"
        type="password"
        layoutKey="LAYOUT_FORM_COLUMN_5"
      /> -->

      <app-z-date-picker
        label="Date Picker"
        placeholder="VD: 100.1, 150, 999.99"
        [required]="true"
        [control]="validateForm.controls.positivePriceGt100"
        layoutKey="LAYOUT_FORM_COLUMN_5"
      />

      <app-z-range-picker
        label="Range Picker"
        [required]="true"
        [control]="validateForm.controls.rangePicker"
        layoutKey="LAYOUT_FORM_COLUMN_5"
      />

      <app-z-select
        label="Select"
        [required]="true"
        [control]="validateForm.controls.select"
        [options]="[
          { label: 'Option 1', value: 1 },
          { label: 'Option 2', value: 2 },
        ]"
        layoutKey="LAYOUT_FORM_COLUMN_3"
      />

      <div nz-col [nzSpan]="24">
        <div nz-row>
          <div nz-col [nzSpan]="12">
            <app-z-text-area
              [control]="validateForm.controls.textArea"
              [required]="true"
              [rows]="5"
              label="truong"
            />
          </div>

          <div nz-col [nzSpan]="12">
            <app-z-radio
              [control]="validateForm.controls.radio"
              [required]="true"
              label="Chọn"
              [options]="[
                { label: 'Option 1', value: 1 },
                { label: 'Option 2', value: 2 },
              ]"
            />
            <app-z-checkbox
              [control]="validateForm.controls.checkbox"
              label="Đồng ý điều khoản"
            />
          </div>
        </div>
      </div>
    </div>

    <div class="cuong">cuong</div>

    <button nz-button nzType="primary" type="submit">Log in</button>
  </form>
  <button nz-button nzType="primary" (click)="logout()">Logout</button>
  <button nz-button nzType="primary" (click)="openUserModal()">
    Open modal
  </button>
  <button nz-button nzType="primary" nzType="link" (click)="openModalCofirm()">
    Open modal confirm
  </button>
  <app-z-button [disabled]="true" label="Xóa" type="danger" tooltip="Xóa bản ghi" icon="save" />

</div>

  <app-z-table
    [data]="listOfData"
    [columns]="columns"
    rowKey="id"
    [pageSize]="10"
    (selectedChange)="onSelectedChange($event)"
  />
