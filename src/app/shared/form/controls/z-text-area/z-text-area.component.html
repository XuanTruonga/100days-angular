<nz-form-item>
  <nz-form-label [nzRequired]="required">
    <ng-content select="[label]"></ng-content>

    <ng-container *ngIf="label">
      {{ label }}
    </ng-container>
  </nz-form-label>

  <nz-form-control [nzValidateStatus]="control" [nzErrorTip]="errorMessage">
    <textarea
      #textAreaRef
      nz-input
      [formControl]="control"
      [placeholder]="placeholder"
      [class]="className"
      [rows]="rows"
    ></textarea>
  </nz-form-control>
</nz-form-item>
